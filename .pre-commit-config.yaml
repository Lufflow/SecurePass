repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: ["-ll", "-f", "screen"]
        exclude: ^tests/

  - repo: local
    hooks:
      - id: pytest-check
        name: Run pytest
        entry: pytest tests/ -x --tb=short -q --collect-only
        language: system
        types: [python]
        pass_filenames: false
        always_run: true